<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Парфюмерный калькулятор</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 20px;
        }
        :root {
            --bg-color: #0a0c0f;
            --text-color: #e0e0e0;
            --panel-bg: #1e1e1e;
            --border-color: #333;
            --input-bg: #2d2d2d;
            --input-border: #404040;
            --accent: #bb86fc;
            --accent-text: #121212;
            --success-bg: #1e3a2e;
            --success-border: #4caf50;
            --danger-bg: #3a1e1e;
            --danger-border: #f44336;
        }
        body.light {
            --bg-color: #f5f5f5;
            --text-color: #121212;
            --panel-bg: #ffffff;
            --border-color: #ddd;
            --input-bg: #f0f0f0;
            --input-border: #ccc;
            --accent: #6200ee;
            --accent-text: #ffffff;
            --success-bg: #e8f5e9;
            --success-border: #2e7d32;
            --danger-bg: #ffebee;
            --danger-border: #c62828;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            cursor: pointer;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background 0.3s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: var(--accent-text);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .tab {
            padding: 12px 30px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover {
            background: var(--input-bg);
            border-color: var(--accent);
        }
        .tab.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }
        .panel {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, .select-input, .search-box input, .edit-field input, .add-ingredient, .remove-ingredient, .add-btn, .delete-btn, .small-btn {
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }
        input, .select-input, .search-box input, .edit-field input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
        }
        input:focus, .select-input:focus, .search-box input:focus, .edit-field input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .custom-select {
            position: relative;
            width: 100%;
        }
        .select-input {
            width: 100%;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .select-input .arrow {
            font-size: 12px;
            transition: transform 0.3s;
        }
        .select-input.open .arrow {
            transform: rotate(180deg);
        }
        .select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .select-dropdown.show {
            display: block;
        }
        .search-box {
            padding: 10px;
            border-bottom: 1px solid var(--input-border);
            position: sticky;
            top: 0;
            background: var(--input-bg);
        }
        .search-box input {
            width: 100%;
            padding: 12px 15px;
        }
        .select-option {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .select-option:hover {
            background: var(--panel-bg);
        }
        .select-option.selected {
            background: var(--accent);
            color: var(--accent-text);
        }
        .no-options {
            padding: 15px;
            text-align: center;
            color: #888;
            font-style: italic;
        }
        .calculator-panel {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            max-width: calc(100% - 100px);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1em;
        }
        .result-card {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            max-width: calc(100% - 100px);
        }
        .result-header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        .result-header h2 {
            color: var(--accent);
            font-size: 2em;
            margin-bottom: 10px;
        }
        .result-header p {
            color: #888;
            font-size: 1.1em;
        }
        .result-section {
            margin-bottom: 30px;
        }
        .result-section h3 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .ingredients-list {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--input-border);
        }
        .ingredient-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--input-border);
            animation: slideInItem 0.3s ease;
        }
        .ingredient-item:last-child {
            border-bottom: none;
        }
        @keyframes slideInItem {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .ingredient-name {
            color: var(--text-color);
        }
        .ingredient-amount {
            font-weight: 700;
            color: var(--accent);
        }
        .editor-panel {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            max-width: calc(100% - 100px);
        }
        .editor-section {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--input-border);
        }
        .editor-section h3 {
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .selector-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            min-width: 250px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .add-btn, .delete-btn, .small-btn {
            padding: 12px 20px;
            border: 1px solid;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .add-btn {
            background: var(--success-bg);
            color: var(--success-border);
            border-color: var(--success-border);
        }
        .add-btn:hover {
            background: var(--success-border);
            color: var(--success-bg);
        }
        .delete-btn {
            background: var(--danger-bg);
            color: var(--danger-border);
            border-color: var(--danger-border);
        }
        .delete-btn:hover {
            background: var(--danger-border);
            color: var(--danger-bg);
        }
        .small-btn {
            padding: 8px 12px;
            font-size: 0.9em;
            background: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
        }
        .small-btn:hover {
            background: var(--panel-bg);
            border-color: var(--accent);
        }
        .item-card {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--input-border);
            animation: slideIn 0.3s ease;
        }
        .item-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--input-border);
        }
        .item-header h4 {
            color: var(--accent);
            font-size: 1.3em;
        }
        .edit-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }
        .edit-field label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 0;
        }
        .ingredients-editor {
            margin-top: 20px;
            padding: 15px;
            background: var(--input-bg);
            border-radius: 8px;
        }
        .ingredients-editor strong {
            color: var(--accent);
            display: block;
            margin-bottom: 15px;
        }
        .ingredient-row {
            display: grid;
            grid-template-columns: 1fr 100px 80px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            animation: slideInRow 0.3s ease;
        }
        @keyframes slideInRow {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .remove-ingredient {
            background: var(--danger-bg);
            color: var(--danger-border);
            border: 1px solid var(--danger-border);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .remove-ingredient:hover {
            background: var(--danger-border);
            color: var(--danger-bg);
        }
        .add-ingredient {
            background: var(--success-bg);
            color: var(--success-border);
            border: 1px solid var(--success-border);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9em;
            transition: transform 0.2s;
        }
        .add-ingredient:hover {
            transform: scale(1.02);
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
            background: var(--panel-bg);
            border-radius: 8px;
            margin-top: 20px;
        }
        .success-message {
            background: var(--success-bg);
            color: var(--success-border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid var(--success-border);
            animation: slideIn 0.3s ease;
        }
        @media (max-width: 768px) {
            .ingredient-row {
                grid-template-columns: 1fr;
            }
            .calculator-panel, .result-card, .editor-panel {
                max-width: 100%;
            }
            .section-header {
                flex-direction: column;
                align-items: stretch;
            }
            .selector-wrapper {
                flex-direction: column;
            }
            .action-buttons {
                justify-content: stretch;
            }
            .action-buttons button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</div>
        <h1>ПАРФЮМЕРНЫЙ КАЛЬКУЛЯТОР</h1>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('calculator')">🧪 КАЛЬКУЛЯТОР</button>
            <button class="tab" onclick="switchTab('editor')">✏️ РЕДАКТОР</button>
        </div>
        <div id="calculatorPanel" class="panel active">
            <div class="calculator-panel">
                <div class="form-group">
                    <label>ВЫБЕРИТЕ ФОРМАТ</label>
                    <div id="calculatorFormatSelect"></div>
                </div>
                <div class="form-group">
                    <label>ВЫБЕРИТЕ АРОМАТ</label>
                    <div id="calculatorAromatSelect"></div>
                </div>
                <div class="form-group">
                    <label>КОЛИЧЕСТВО ФЛАКОНОВ</label>
                    <input type="number" id="bottlesInput" min="1" value="1" step="1">
                </div>
            </div>
            <div id="resultCard" class="result-card"></div>
        </div>
        <div id="editorPanel" class="panel">
            <div class="editor-panel">
                <div class="success-message" id="successMessage">✅ СОХРАНЕНО</div>
                <div class="editor-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>📊 ФОРМАТЫ</h3>
                        <div style="display: flex; gap: 10px;">
                            <button class="small-btn" onclick="exportFormatsJSON()">📤 Ф (JSON)</button>
                            <button class="small-btn" onclick="importFormatsJSON()">📥 Ф (JSON)</button>
                            <button class="small-btn" onclick="exportFormatsXLSX()">📊 Ф (Excel)</button>
                            <button class="small-btn" onclick="importFormatsXLSX()">📥 Ф (Excel)</button>
                        </div>
                    </div>
                    <div class="section-header">
                        <div class="selector-wrapper">
                            <div id="editorFormatSelect" style="flex: 1;"></div>
                            <div class="action-buttons">
                                <button class="add-btn" onclick="addFormat()">+ НОВЫЙ</button>
                                <button class="delete-btn" onclick="deleteCurrentFormat()">УДАЛИТЬ</button>
                            </div>
                        </div>
                    </div>
                    <div id="formatEditorContainer"></div>
                </div>
                <div class="editor-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>🌸 АРОМАТЫ</h3>
                        <div style="display: flex; gap: 10px;">
                            <button class="small-btn" onclick="exportAromatsJSON()">📤 А (JSON)</button>
                            <button class="small-btn" onclick="importAromatsJSON()">📥 А (JSON)</button>
                            <button class="small-btn" onclick="exportAromatsXLSX()">📊 А (Excel)</button>
                            <button class="small-btn" onclick="importAromatsXLSX()">📥 А (Excel)</button>
                        </div>
                    </div>
                    <div class="section-header">
                        <div class="selector-wrapper">
                            <div id="editorAromatSelect" style="flex: 1;"></div>
                            <div class="action-buttons">
                                <button class="add-btn" onclick="addAromat()">+ НОВЫЙ</button>
                                <button class="delete-btn" onclick="deleteCurrentAromat()">УДАЛИТЬ</button>
                            </div>
                        </div>
                    </div>
                    <div id="aromatEditorContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = 'save_data.php';

        /** @typedef {Object} Ingredient
         * @property {string} name
         * @property {number|string} grams */

        /** @typedef {Object} Format
         * @property {string} id
         * @property {string} name
         * @property {number} coefficient
         * @property {Ingredient[]} ingredients */

        /** @typedef {Object} Aromat
         * @property {string} id
         * @property {string} name
         * @property {Ingredient[]} ingredients */

        /** @typedef {Object} Data
         * @property {Object.<string, Format>} formats
         * @property {Object.<string, Aromat>} aromats */

        /** @type Data */
        let data = {
            formats: {
                'format1': { id: 'format1', name: 'ПРОБНИК', coefficient: 0.5, ingredients: [{ name: 'Спирт', grams: 8 }, { name: 'Вода', grams: 2 }] },
                'format2': { id: 'format2', name: 'МАЛЫЙ', coefficient: 1, ingredients: [{ name: 'Спирт', grams: 16 }, { name: 'Вода', grams: 4 }] },
                'format3': { id: 'format3', name: 'БОЛЬШОЙ', coefficient: 2, ingredients: [{ name: 'Спирт', grams: 32 }, { name: 'Вода', grams: 8 }] }
            },
            aromats: {
                'aromat1': { id: 'aromat1', name: 'ЦИТРУСОВЫЙ', ingredients: [{ name: 'Бергамот', grams: 30 }, { name: 'Лимон', grams: 25 }, { name: 'Апельсин', grams: 20 }] },
                'aromat2': { id: 'aromat2', name: 'ЦВЕТОЧНЫЙ', ingredients: [{ name: 'Жасмин', grams: 40 }, { name: 'Роза', grams: 30 }, { name: 'Иланг-иланг', grams: 20 }] },
                'aromat3': { id: 'aromat3', name: 'ДРЕВЕСНЫЙ', ingredients: [{ name: 'Кедр', grams: 35 }, { name: 'Сандал', grams: 25 }, { name: 'Пачули', grams: 20 }] }
            }
        };

        let selectedFormatId = 'format1';
        let selectedAromatId = 'aromat1';
        let currentEditFormatId = null;
        let currentEditAromatId = null;

        let saveTimeout = null;
        function debouncedSave() {
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveToServer();
                saveTimeout = null;
            }, 500);
        }

        async function loadFromServer() {
            try {
                const response = await fetch(SERVER_URL);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const serverData = await response.json();
                if (serverData?.formats && serverData?.aromats) data = serverData;
            } catch (e) {
                console.warn('Не удалось загрузить данные с сервера, используем начальные');
            }
            const formatIds = Object.keys(data.formats);
            const aromatIds = Object.keys(data.aromats);
            selectedFormatId = formatIds.length ? formatIds[0] : null;
            selectedAromatId = aromatIds.length ? aromatIds[0] : null;
            currentEditFormatId = formatIds.length ? formatIds[0] : null;
            currentEditAromatId = aromatIds.length ? aromatIds[0] : null;
            renderCalculatorSelects();
            renderEditorSelects();
            calculateRecipe();
        }

        async function saveToServer() {
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Ошибка сохранения');
            } catch (e) {
                console.error('Ошибка при сохранении на сервер:', e);
                Swal.fire('Ошибка', 'Не удалось сохранить данные на сервер.', 'error');
            }
        }

        function saveChanges() {
            debouncedSave();
        }

        window.toggleTheme = function() {
            document.body.classList.toggle('light');
            const btn = document.getElementById('themeToggle');
            btn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (tab === 'calculator') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('calculatorPanel').classList.add('active');
                renderCalculatorSelects();
                calculateRecipe();
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('editorPanel').classList.add('active');
                renderEditorSelects();
            }
        };

        /** @param {string} containerId
         * @param {Array<{id:string, name:string}>} options
         * @param {string} selectedId
         * @param {function(string):void} onChange */
        function renderCustomSelect(containerId, options, selectedId, onChange) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            const selectedOption = options.find(opt => opt.id === selectedId);
            const selectDiv = document.createElement('div');
            selectDiv.className = 'custom-select';
            const inputDiv = document.createElement('div');
            inputDiv.className = 'select-input';
            inputDiv.innerHTML = `<span>${selectedOption ? selectedOption.name : '— ВЫБЕРИТЕ —'}</span><span class="arrow">▼</span>`;
            const dropdownDiv = document.createElement('div');
            dropdownDiv.className = 'select-dropdown';
            const searchBox = document.createElement('div');
            searchBox.className = 'search-box';
            searchBox.innerHTML = '<input type="text" placeholder="Поиск...">';
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options-list';
            dropdownDiv.appendChild(searchBox);
            dropdownDiv.appendChild(optionsDiv);
            selectDiv.appendChild(inputDiv);
            selectDiv.appendChild(dropdownDiv);
            container.appendChild(selectDiv);
            let isOpen = false;
            function renderOptions(filter = '') {
                const filterLower = filter.toLowerCase();
                const filtered = options.filter(opt => {
                    const name = String(opt.name || '').toLowerCase();
                    return name.includes(filterLower);
                });
                optionsDiv.innerHTML = '';
                if (filtered.length === 0) {
                    optionsDiv.innerHTML = '<div class="no-options">Нет совпадений</div>';
                    return;
                }
                filtered.forEach(opt => {
                    const optionEl = document.createElement('div');
                    optionEl.className = `select-option ${opt.id === selectedId ? 'selected' : ''}`;
                    optionEl.textContent = opt.name;
                    optionEl.dataset.id = opt.id;
                    optionEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectedId = opt.id;
                        inputDiv.querySelector('span:first-child').textContent = opt.name;
                        onChange(opt.id);
                        closeDropdown();
                    });
                    optionsDiv.appendChild(optionEl);
                });
            }
            renderOptions();
            function openDropdown() {
                isOpen = true;
                inputDiv.classList.add('open');
                dropdownDiv.classList.add('show');
                const searchInput = searchBox.querySelector('input');
                searchInput.value = '';
                searchInput.focus();
                renderOptions();
                setTimeout(() => document.addEventListener('click', closeOnClickOutside), 0);
            }
            function closeDropdown() {
                isOpen = false;
                inputDiv.classList.remove('open');
                dropdownDiv.classList.remove('show');
                document.removeEventListener('click', closeOnClickOutside);
            }
            function closeOnClickOutside(e) {
                if (!selectDiv.contains(e.target)) closeDropdown();
            }
            inputDiv.addEventListener('click', (e) => {
                e.stopPropagation();

        window.calculateRecipe = function() {
            const format = data.formats[selectedFormatId];
            const aromat = data.aromats[selectedAromatId];
            const bottles = parseInt(document.getElementById('bottlesInput').value) || 1;
            if (!format || !aromat) {
                document.getElementById('resultCard').innerHTML = '<div class="empty-message">Выберите формат и аромат</div>';
                return;
            }
            const formatTotal = format.ingredients.map(ing => {
                let amount;
                if (typeof ing.grams === 'number' || !isNaN(parseFloat(ing.grams))) {
                    const num = parseFloat(ing.grams);
                    amount = !isNaN(num) ? (num * bottles).toFixed(2) + ' Г' : ing.grams;
                } else {
                    amount = ing.grams;
                }
                return { name: ing.name, amount };
            });
            const aromatTotal = aromat.ingredients.map(ing => ({
                name: ing.name,
                amount: (ing.grams * format.coefficient * bottles).toFixed(2) + ' Г'
            }));
            const totalAromatGrams = aromat.ingredients.reduce((sum, ing) => sum + ing.grams, 0) * format.coefficient * bottles;
            const roundedTotal = Math.ceil(totalAromatGrams * 10) / 10;
            const formatTotalHtml = formatTotal.map(ing => `<div class="ingredient-item"><span class="ingredient-name">${ing.name}</span><span class="ingredient-amount">${ing.amount}</span></div>`).join('');
            const aromatHtml = aromatTotal.map(ing => `<div class="ingredient-item"><span class="ingredient-name">${ing.name}</span><span class="ingredient-amount">${ing.amount}</span></div>`).join('');
            document.getElementById('resultCard').innerHTML = `
                <div class="result-header">
                    <h2>${aromat.name} / ${format.name}</h2>
                    <p>Коэффициент формата: ${format.coefficient} | Флаконов: ${bottles}</p>
                </div>
                <div class="result-section">
                    <h3>📦 ОСНОВА (ФОРМАТ) НА ${bottles} ФЛАКОНОВ:</h3>
                    <div class="ingredients-list">${formatTotalHtml}</div>
                </div>
                <div class="result-section">
                    <h3>🧪 ВСЕГО ОТДУШЕК НА ${bottles} ФЛАКОНОВ:</h3>
                    <div class="ingredients-list">
                        <div class="ingredient-item">
                            <span class="ingredient-name">Общий вес отдушек</span>
                            <span class="ingredient-amount">${roundedTotal.toFixed(1)} Г</span>
                        </div>
                    </div>
                </div>
                <div class="result-section">
                    <h3>🌸 ОТДУШКИ НА ${bottles} ФЛАКОНОВ (ПО КОМПОНЕНТАМ):</h3>
                    <div class="ingredients-list">${aromatHtml}</div>
                </div>
            `;
        };

        // ========== Excel экспорт/импорт с цветами ==========
        const colorPalette = [
            {r:255,g:200,b:200}, {r:200,g:255,b:200}, {r:200,g:200,b:255},
            {r:255,g:255,b:200}, {r:255,g:200,b:255}, {r:200,g:255,b:255},
            {r:255,g:220,b:180}, {r:220,g:220,b:255}, {r:255,g:180,b:180},
            {r:180,g:255,b:180}, {r:180,g:180,b:255}, {r:255,g:240,b:180},
        ];

        function getColorById(id) {
            let hash = 0;
            for (let i = 0; i < id.length; i++) {
                hash = id.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % colorPalette.length;
            return colorPalette[index];
        }

        window.exportFormatsXLSX = async function() {
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Formats');
            worksheet.columns = [
                { header: 'FormatID', key: 'id', width: 20 },
                { header: 'FormatName', key: 'name', width: 30 },
                { header: 'Coefficient', key: 'coeff', width: 15 },
                { header: 'IngredientName', key: 'ingName', width: 30 },
                { header: 'IngredientGrams', key: 'ingGrams', width: 20 }
            ];
            Object.values(data.formats).forEach(format => {
                const color = getColorById(format.id);
                const argb = `FF${color.r.toString(16).padStart(2,'0')}${color.g.toString(16).padStart(2,'0')}${color.b.toString(16).padStart(2,'0')}`;
                format.ingredients.forEach(ing => {
                    const row = worksheet.addRow({
                        id: format.id,
                        name: format.name,
                        coeff: format.coefficient,
                        ingName: ing.name,
                        ingGrams: ing.grams
                    });
                    row.eachCell({ includeEmpty: false }, (cell) => {
                        cell.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb }
                        };
                    });
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `formats-${new Date().toISOString().slice(0,10)}.xlsx`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.importFormatsXLSX = async function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx, .xls';
            input.onchange = async function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const buffer = e.target.result;
                        const workbook = new ExcelJS.Workbook();
                        await workbook.xlsx.load(buffer);
                        const worksheet = workbook.getWorksheet(1);
                        if (!worksheet) throw new Error('Не удалось прочитать лист');

                        const headerRow = worksheet.getRow(1);
                        const headers = [];
                        headerRow.eachCell({ includeEmpty: false }, (cell, colNumber) => {
                            headers[colNumber - 1] = cell.text;
                        });

                        const expectedHeaders = ['FormatID', 'FormatName', 'Coefficient', 'IngredientName', 'IngredientGrams'];
                        if (headers.length !== expectedHeaders.length || !headers.every((h, i) => h === expectedHeaders[i])) {
                            throw new Error('Неверный формат столбцов. Ожидаются: ' + expectedHeaders.join(', '));
                        }

                        const newFormats = {};
                        worksheet.eachRow({ includeEmpty: false }, (row, rowNumber) => {
                            if (rowNumber === 1) return;
                            const values = [];
                            row.eachCell({ includeEmpty: false }, (cell) => {
                                values.push(cell.value);
                            });
                            if (values.length < 5) return;
                            const [formatId, formatName, coeff, ingName, ingGrams] = values;
                            if (!formatId || !formatName || coeff === undefined || !ingName || ingGrams === undefined) return;

                            if (!newFormats[formatId]) {
                                newFormats[formatId] = {
                                    id: formatId,
                                    name: formatName,
                                    coefficient: parseFloat(coeff),
                                    ingredients: []
                                };
                            }

                            let gramsValue = ingGrams;
                            const num = parseFloat(ingGrams);
                            if (!isNaN(num) && ingGrams.toString().trim() !== '') {
                                gramsValue = num;
                            }

                            newFormats[formatId].ingredients.push({
                                name: ingName,
                                grams: gramsValue
                            });
                        });

                        data.formats = newFormats;
                        const formatIds = Object.keys(data.formats);
                        selectedFormatId = formatIds.length ? formatIds[0] : null;
                        currentEditFormatId = formatIds.length ? formatIds[0] : null;
                        saveChanges();
                        const activeTab = document.querySelector('.tab.active').textContent.includes('КАЛЬКУЛЯТОР') ? 'calculator' : 'editor';
                        if (activeTab === 'calculator') {
                            renderCalculatorSelects();
                            calculateRecipe();
                        } else {
                            renderEditorSelects();
                        }
                        Swal.fire('Успех', 'Форматы импортированы из Excel', 'success');
                    } catch (err) {
                        Swal.fire('Ошибка', err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
            };
            input.click();
        };

            const worksheet = workbook.addWorksheet('Aromats');

                const color = getColorById(aroma.id);
                const argb = `FF${color.r.toString(16).padStart(2,'0')}${color.g.toString(16).padStart(2,'0')}${color.b.toString(16).padStart(2,'0')}`;
                aroma.ingredients.forEach(ing => {
                    const row = worksheet.addRow({
                        id: aroma.id,
                        name: aroma.name,
                        ingName: ing.name,
                        ingGrams: ing.grams
                    });
                    row.eachCell({ includeEmpty: false }, (cell) => {
                        cell.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb }
                        };
                    });
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `aromats-${new Date().toISOString().slice(0,10)}.xlsx`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.importAromatsXLSX = async function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.xlsx, .xls';
            input.onchange = async function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const buffer = e.target.result;
                        const workbook = new ExcelJS.Workbook();
                        await workbook.xlsx.load(buffer);
                        const worksheet = workbook.getWorksheet(1);
                        if (!worksheet) throw new Error('Не удалось прочитать лист');

                        const headerRow = worksheet.getRow(1);
                        const headers = [];
                        headerRow.eachCell({ includeEmpty: false }, (cell, colNumber) => {
                            headers[colNumber - 1] = cell.text;
                        });

                        const expectedHeaders = ['AromaID', 'AromaName', 'IngredientName', 'IngredientGrams'];
                        if (headers.length !== expectedHeaders.length || !headers.every((h, i) => h === expectedHeaders[i])) {
                            throw new Error('Неверный формат столбцов. Ожидаются: ' + expectedHeaders.join(', '));
                        }

                        const newAromats = {};
                        worksheet.eachRow({ includeEmpty: false }, (row, rowNumber) => {
                            if (rowNumber === 1) return;
                            const values = [];
                            row.eachCell({ includeEmpty: false }, (cell) => {
                                values.push(cell.value);
                            });
                            if (values.length < 4) return;
                            const [aromaId, aromaName, ingName, ingGrams] = values;
                            if (!aromaId || !aromaName || !ingName || ingGrams === undefined) return;

                            if (!newAromats[aromaId]) {
                                newAromats[aromaId] = {
                                    id: aromaId,
                                    name: aromaName,
                                    ingredients: []
                                };
                            }

                            const num = parseFloat(ingGrams);
                            const gramsValue = (!isNaN(num) && ingGrams.toString().trim() !== '') ? num : ingGrams;

                            newAromats[aromaId].ingredients.push({
                                name: ingName,
                                grams: gramsValue
                            });
                        });

                        data.aromats = newAromats;
                        const aromatIds = Object.keys(data.aromats);
                        selectedAromatId = aromatIds.length ? aromatIds[0] : null;
                        currentEditAromatId = aromatIds.length ? aromatIds[0] : null;
                        saveChanges();
                        const activeTab = document.querySelector('.tab.active').textContent.includes('КАЛЬКУЛЯТОР') ? 'calculator' : 'editor';
                        if (activeTab === 'calculator') {
                            renderCalculatorSelects();
                            calculateRecipe();
                        } else {
                            renderEditorSelects();
                        }
                        Swal.fire('Успех', 'Ароматы импортированы из Excel', 'success');
                    } catch (err) {
                        Swal.fire('Ошибка', err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
            };
            input.click();
        };

        loadFromServer();
        document.getElementById('bottlesInput').addEventListener('input', calculateRecipe);
    </script>
</body>
</html>
